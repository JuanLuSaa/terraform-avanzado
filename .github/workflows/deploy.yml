name: Terraform Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Levantamos LocalStack como un servicio nativo de GitHub
    services:
      localstack:
        image: localstack/localstack:4.14.0
        ports:
          - 4566:4566
        env:
          SERVICES: s3,dynamodb
          DEBUG: 1

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      # Pequeña espera de seguridad para que el servicio esté listo
      - name: Esperar a LocalStack
        run: |
          echo "Esperando a que LocalStack responda..."
          until curl -s http://localhost:4566/_localstack/health | grep -q "\"s3\": \"running\""; do
            sleep 5
            echo "Todavía cargando..."
          done
          echo "¡LocalStack listo!"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        run: terraform apply -auto-approve
